<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Gestão de Projetos Elétricos</title>

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>

    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>

</head>

<style>
    body {
        font-family: Arial;
        margin: 0;
        background: #f2f2f2;
    }

    /* BARRA SUPERIOR */

    .topo {
        background: #2c3e50;
        color: white;
        padding: 15px;
        text-align: center;
        font-size: 24px;
    }

    /* CONTAINER */

    .container {
        width: 900px;
        margin: auto;
        margin-top: 20px;
    }

    /* CARD */

    .card {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0px 0px 8px gray;
        margin-bottom: 20px;
    }

    /* LOGO */

    .logo {
        text-align: center;
    }

    /* INPUTS */

    input {
        width: 100%;
        padding: 8px;
        margin-top: 8px;
    }

    /* GRID FORM */

    .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
    }

    /* BOTÕES */

    .botoes {
        text-align: center;
        margin-top: 15px;
    }

    button {
        padding: 10px 15px;
        margin: 5px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    .salvar {
        background: #27ae60;
        color: white;
    }

    .limparCampos {
        background: #f39c12;
        color: white;
    }

    .buscarArtista {
        background: #f37712;
        color: white;
    }

    .listarTodos {
        background: #2980b9;
        color: white;
    }

    /* TABELA */

    table {
        width: 100%;
        border-collapse: collapse;
    }

    th,
    td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: center;
    }

    th {
        background: #34495e;
        color: white;
    }
</style>

</head>

<body>

    <div class="topo">

        <img src="Imagens/Carlos1.gif" width="50">
        Gestão de Projetos Eletricos
    </div>

    <a href="PaginaPessoal.html" class="btn btn-default">
        <span class="glyphicon glyphicon-home"></span> Página Principal
    </a>

    <div class="container">

        <div class="card">

            <div class="logo">
                <img src="Imagens/Carlos.png" width="250">
            </div>

            <h2>Cadastrar Projetos DWG e outros</h2>

            <div class="grid">

                <input type="text" id="titulo" placeholder="Título">

                <input type="text" id="cliente" placeholder="Cliente">

                <input type="text" id="tamanhodoimovel" placeholder="Tamanho do Imovel">

                <input type="text" id="valordoprojeto" placeholder="Valor do Projeto">

                <input type="text" id="datadaentrega" placeholder="Data da Entrega">

                <input type="text" id="tipo" placeholder="Tipo">

                <input type="text" id="genero" placeholder="Gênero">

            </div>

            <div class="botoes">

                <button class="salvar" onclick="salvar()">Salvar</button>

                <button class="limparCampos" onclick="limparCampos()">Limpar</button>

                <button class="cliente" onclick="cliente()">Buscar Cliente</button>

                <button class="listarTodos" onclick="listarTodos()">Listar Projetos</button>

            </div>

        </div>

        <div class="card">

            <h2>Lista de Projetos</h2>

            <table>

                <thead>

                    <tr>

                        <th>ID</th>
                        <th>Título</th>
                        <th>Cliente</th>
                        <th>T.doImovel</th>
                        <th>Valor</th>
                        <th>DataEntrega</th>
                        <th>Ação</th>

                    </tr>

                </thead>

                <tbody id="tabelaProjetos">

                </tbody>

            </table>

        </div>

    </div>

    <script>

        const api = "http://localhost:8084/projetos";

        function listarTodos() {

            fetch(api)

                .then(response => response.json())

                .then(data => {

                    const tabela = document.getElementById("tabelaProjetos");

                    tabela.innerHTML = "";

                    data.forEach(show => {

                        tabela.innerHTML += `
<tr>
<td>${show.id}</td>
<td>${show.titulo}</td>
<td>${show.cliente}</td>
<td>${show.tamanhodoimovel}</td>
<td>${show.valordoprojeto}</td>
<td>${show.genero}</td>

<td>
<button onclick="deletar(${show.id})">
Excluir
</button>
</td>

</tr>
`;

                    });

                });

        }


        function salvar() {

            const titulo = document.getElementById("titulo").value;
            const cliente = document.getElementById("cliente").value;
            const tamanhodoimovel = document.getElementById("tamanhodoimovel").value;
            const valordoprojeto = document.getElementById("valordoprojeto").value;
            const datadaentrega = document.getElementById("datadaentrega").value;
            const tipo = document.getElementById("tipo").value;
            const genero = document.getElementById("genero").value;

            fetch(api, {

                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({

                    titulo,
                    cliente,
                    tamanhodoimovel,
                    valordoprojeto,
                    datadaentrega,
                    tipo,
                    genero

                })

            })

                .then(response => response.json())

                .then(data => {

                    limparCampos();

                    carregar();

                });

        }


        function deletar(id) {

            if (!confirm("Deseja excluir este registro?")) {
                return;
            }

            fetch(`${api}/${id}`, {

                method: "DELETE"

            })

                .then(() => carregar());

        }


        function cliente() {

            const cliente = document.getElementById("cliente").value;

            fetch(`${api}/buscar?cliente=${cliente}`)

                .then(response => response.json())

                .then(data => {

                    const tabela = document.getElementById("tabelaShows");

                    tabela.innerHTML = "";

                    if (data.length === 0) {

                        tabela.innerHTML = `
<tr>
<td colspan="7">Nenhum resultado encontrado</td>
</tr>
`;

                        return;
                    }

                    data.forEach(show => {

                        tabela.innerHTML += `
<tr>
<td>${show.id}</td>
<td>${show.titulo}</td>
<td>${show.cliente}</td>
<td>${show.tamanhodoimovel}</td>
<td>${show.valordoprojeto}</td>
<td>${show.genero}</td>

<td>
<button onclick="deletar(${show.id})">
Excluir
</button>
</td>

</tr>
`;

                    });

                });

        }


        function limparCampos() {
            document.getElementById("titulo").value = "";
            document.getElementById("cliente").value = "";
            document.getElementById("tamanhodoimovel").value = "";
            document.getElementById("valordoprojeto").value = "";
            document.getElementById("datada entrega").value = "";
            document.getElementById("tipo").value = "";
            document.getElementById("genero").value = "";

        }

        carregar();

    </script>

</body>

</html>
