<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Gestão de Contatos Pessoais</title>

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>

    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
    </head>

    <style>
        body {
            background-color: #f6f6f6;
            font-family: Arial;
        }

        .topo {
            background: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 24px;
        }

        .container {
            max-width: 900px;
             margin: auto;
             margin-top: 20px;
        }

        .card {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0px 0px 8px gray;
        margin-bottom: 20px;
    }

    /* LOGO */

    .logo {
        text-align: center;
    }

    /* INPUTS */

    input {
        width: 100%;
        padding: 8px;
        margin-top: 8px;
    }

    /* GRID FORM */

    .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
    }

    /* BOTÕES */

    .botoes {
        text-align: center;
        margin-top: 15px;
    }

    button {
        padding: 10px 15px;
        margin: 5px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    .salvar {
        background: #27ae60;
        color: white;
    }

    .limparCampos {
        background: #f39c12;
        color: white;
    }

    .buscarIntegrante {
        background: #f37712;
        color: white;
    }

    .listarTodos {
        background: #2980b9;
        color: white;
    }

    /* TABELA */

    table {
        width: 100%;
        border-collapse: collapse;
    }

    th,
    td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: center;
    }

    th {
        background: #34495e;
        color: white;
    }

    </style>

</head>

<body>

    <div class="container">

        <div class="card">

            <a href="PaginaPessoal.html" class="btn btn-default">
            <span class="glyphicon glyphicon-home"></span> Página Principal
            </a>

            <div class="logo">
                <h1><img src="Imagens/carlos1.gif" width="60">
                    Gestão de Contatos Pessoais</h1>
            </div>

            <h2>Cadastrar ou Alterar Contatos</h2>

            <div class="grid">

                <input type="hidden" id="id">               

                <input type="text" id="cpf" placeholder="CPF">
                
                <input type="text" id="nome" placeholder="Nome">
                
                <input type="text" id="telefone" placeholder="Telefone">
                
                <input type="text" id="endereço" placeholder="Endereço">                
                
            </div>

            <div class="botoes">

                <button class="btn btn-success" onclick="salvar()">
                    <i class="fa fa-save"></i> Salvar
                </button>

                <button class="btn btn-secondary" onclick="limparCampos()">
                    <i class="fa fa-eraser"></i> Limpar
                </button>

                <button class="btn btn-primary" onclick="nome()">
                    <i class="fa fa-search"></i> Buscar Nome
                </button>

                <button class="btn btn-info" onclick="listarTodos()">
                    <i class="fa fa-list"></i> Listar Nomes
                </button>

            </div>

            <h3>Login do Sistema</h3>

            <div>

                <label>Usuário</label>
                <input type="text" class="form-control">

                <label>Senha</label>
                <input type="password" class="form-control">

                <button class="btn btn-primary">Realizar Login</button>

            </div>
            </div>
            
                <br>

            <div class="card">

                <h2>Lista de Contatos</h2>

                <table>

                    <thead>

                        <tr>
                            
                            <th>CPF</th>
                            <th>Nome</th>
                            <th>Telefone</th>
                            <th>Endereço</th>                            
                            <th>Ação</th>

                        </tr>

                    </thead>

                    <tbody id="tabelaContato">

                    </tbody>

                </table>

            </div>

        </div>

        <script>

            const api = "http://localhost:8084/contato";

            function carregar() {
                //listarTodos();
            }

            function listarTodos() {

                fetch(api)
                    .then(response => response.json())
                    .then(data => {

                        const tabela = document.getElementById("tabelaContato");
                        tabela.innerHTML = "";

                        data.forEach(show => {

                            tabela.innerHTML += `
<tr>

<td>${show.cpf}</td>
<td>${show.nome}</td>
<td>${show.telefone}</td>
<td>${show.endereço}</td>

<td>
<button class="btn btn-danger btn-sm"
onclick="editar(${show.id})">
Editar
</button>

<button class="btn btn-danger btn-sm"
onclick="deletar(${show.id})">
Excluir
</button>
</td>

</tr>
`;

                        });

                    });

            }

            function salvar() {

                const cpf = document.getElementById("cpf").value;
                const nome = document.getElementById("nome").value;
                const telefone = document.getElementById("telefone").value;
                const endereço = document.getElementById("endereço").value;
                
                fetch(api, {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify({

                        cpf,
                        nome,
                        telefone,
                        endereço,                       

                    })

                })
                    .then(response => response.json())
                    .then(data => {

                        alert("Projeto salvo com sucesso!");

                        limparCampos();
                        listarTodos();

                    });

            }

     function editar() {
        const id = document.getElementById("id").value;

        const dados = {
       
        cpf: document.getElementById("cpf").value,
        integrante: document.getElementById("integrante").value,
        telefone: document.getElementById("telefone").value,
        bemcadastrado: document.getElementById("bemcadastrado").value,
        documento: document.getElementById("documento").value

    };

    fetch(api + "/" + id, {

        method: "PUT",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify(dados)

    })

    .then(() => {

        alert("Dados atualizados com sucesso!");

        limparCampos();

        listarTodos();

    });

}

            function deletar(id) {

                fetch(`${api}/${id}`, {
                    method: "DELETE"
                })
                    .then(() => listarTodos());

            }

            function limparCampos() {

                document.getElementById("cpf").value = "";
                document.getElementById("nome").value = "";
                document.getElementById("telefone").value = "";
                document.getElementById("endereço").value = "";                

            }

            //listarTodos();

            function nome() {
            const nome = document.getElementById("nome").value;

            fetch("http://localhost:8084/contato/buscar?nome=" + encodeURIComponent(nome))

                .then(response => response.json())

                .then(data => {

                    const tabela = document.getElementById("tabelaContato");

                    tabela.innerHTML = "";

                    if (data.length === 0) {

                        tabela.innerHTML = `
<tr>
<td colspan="7">Nenhum resultado encontrado</td>
</tr>
`;

                        return;
                    }

                    data.forEach(show => {

                        tabela.innerHTML += `
<tr>
<td>${show.cpf}</td>
<td>${show.nome}</td>
<td>${show.telefone}</td>
<td>${show.endereço}</td>

<td>

<button class="btn btn-danger btn-sm"
onclick="editar(${show.id})">
Editar
</button>

<button class="btn btn-danger btn-sm"
onclick="deletar(${show.id})">
Excluir
</button>
</td>

</tr>
`;

                    });

                });

        }

        </script>

</body>

</html>
