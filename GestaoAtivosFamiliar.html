<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Gestão de Ativos Familiar</title>

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>

    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
    </head>

    <style>
        body {
            background-color: #f6f6f6;
            font-family: Arial;
        }

        .topo {
            background: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 24px;
        }

        .container {
            max-width: 900px;
             margin: auto;
             margin-top: 20px;
        }

        .card {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0px 0px 8px gray;
        margin-bottom: 20px;
    }

    /* LOGO */

    .logo {
        text-align: center;
    }

    /* INPUTS */

    input {
        width: 100%;
        padding: 8px;
        margin-top: 8px;
    }

    /* GRID FORM */

    .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
    }

    /* BOTÕES */

    .botoes {
        text-align: center;
        margin-top: 15px;
    }

    button {
        padding: 10px 15px;
        margin: 5px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    .salvar {
        background: #27ae60;
        color: white;
    }

    .limparCampos {
        background: #f39c12;
        color: white;
    }

    .buscarIntegrante {
        background: #f37712;
        color: white;
    }

    .listarTodos {
        background: #2980b9;
        color: white;
    }

    /* TABELA */

    table {
        width: 100%;
        border-collapse: collapse;
    }

    th,
    td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: center;
    }

    th {
        background: #34495e;
        color: white;
    }

    </style>

</head>

<body>    

    <div class="container">

        <div class="card">
            <a href="PaginaPessoal.html" class="btn btn-default">
        <span class="glyphicon glyphicon-home"></span> Página Principal
         </a>

            <div class="logo">
                <h1><img src="carlos1.gif" width="60">
                  Gestão de Ativos Familiar</h1>
            </div>

            <h2>Cadastrar ou alterar Integrantes</h2>

            <div class="grid">

                <input type="hidden" id="id">               

                <input type="text" id="cpf" placeholder="CPF">
                
                <input type="text" id="integrante" placeholder="Integrante">
                
                <input type="text" id="telefone" placeholder="Telefone">
                
                <input type="text" id="bemcadastrado" placeholder="Bem">
                
                <input type="text" id="documento" placeholder="Documento">
            </div>

            <div class="botoes">

                <button class="btn btn-success" onclick="salvar()">
                    <i class="fa fa-save"></i> Salvar
                </button>

                <button class="btn btn-secondary" onclick="limparCampos()">
                    <i class="fa fa-eraser"></i> Limpar
                </button>

                <button class="btn btn-primary" onclick="integrante()">
                    <i class="fa fa-search"></i> Buscar Integrante
                </button>

                <button class="btn btn-info" onclick="listarTodos()">
                    <i class="fa fa-list"></i> Listar Projetos
                </button>

            </div>

            <h3>Login do Sistema</h3>

            <div>

                <label>Usuário</label>
                <input type="text" class="form-control">

                <label>Senha</label>
                <input type="password" class="form-control">

                <button class="btn btn-primary">Realizar Login</button>

            </div>
            </div>
            
                <br>

            <div class="card">

                <h2>Lista de Familiares</h2>

                <table>

                    <thead>

                        <tr>
                            
                            <th>CPF</th>
                            <th>Integrante</th>
                            <th>Telefone</th>
                            <th>Bem Cadastrado</th>
                            <th>Documento</th>
                            <th>Ação</th>

                        </tr>

                    </thead>

                    <tbody id="tabelaFamilia">

                    </tbody>

                </table>

            </div>

        </div>

        <script>

            const api = "http://localhost:8084/familia";

            function carregar() {
                //listarTodos();
            }

            function listarTodos() {

                fetch(api)
                    .then(response => response.json())
                    .then(data => {

                        const tabela = document.getElementById("tabelaFamilia");
                        tabela.innerHTML = "";

                        data.forEach(show => {

                            tabela.innerHTML += `
<tr>

<td>${show.cpf}</td>
<td>${show.integrante}</td>
<td>${show.telefone}</td>
<td>${show.bemcadastrado}</td>
<td>${show.documento}</td>

<td>
<button class="btn btn-danger btn-sm"
onclick="editar(${show.id})">
Editar
</button>

<button class="btn btn-danger btn-sm"
onclick="deletar(${show.id})">
Excluir
</button>
</td>

</tr>
`;

                        });

                    });

            }

            function salvar() {

                const cpf = document.getElementById("cpf").value;
                const integrante = document.getElementById("integrante").value;
                const telefone = document.getElementById("telefone").value;
                const bemcadastrado = document.getElementById("bemcadastrado").value;
                const documento = document.getElementById("documento").value;

                fetch(api, {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify({

                        cpf,
                        integrante,
                        telefone,
                        bemcadastrado,
                        documento

                    })

                })
                    .then(response => response.json())
                    .then(data => {

                        alert("Projeto salvo com sucesso!");

                        limparCampos();
                        listarTodos();

                    });

            }

     function editar() {

    const id = document.getElementById("id").value;

    if (!id) {
        alert("Selecione um registro para editar.");
        return;
    }

    const dados = {

        cpf: document.getElementById("cpf").value,
        integrante: document.getElementById("integrante").value,
        telefone: document.getElementById("telefone").value,
        bemcadastrado: document.getElementById("bemcadastrado").value,
        documento: document.getElementById("documento").value

    };

    if (confirm("Deseja realmente atualizar este registro?")) {

        fetch(api + "/" + id, {

            method: "PUT",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify(dados)

        })

        .then(response => {
            if (!response.ok) {
                throw new Error("Erro ao atualizar");
            }
            return response.json();
        })

        .then(() => {

            alert("Dados atualizados com sucesso!");

            limparCampos();

            listarTodos();

        })

        .catch(error => {

            console.error("Erro:", error);

            alert("Erro ao atualizar o registro.");

        });

    }

}

            function deletar(id) {

                fetch(`${api}/${id}`, {
                    method: "DELETE"
                })
                    .then(() => listarTodos());

            }

            function limparCampos() {

                document.getElementById("cpf").value = "";
                document.getElementById("integrante").value = "";
                document.getElementById("telefone").value = "";
                document.getElementById("bemcadastrado").value = "";
                document.getElementById("documento").value = "";

            }

            //listarTodos();

            function integrante() {
            const integrante = document.getElementById("integrante").value;

            fetch("http://localhost:8084/familia/buscar?integrante=" + encodeURIComponent(integrante))

                .then(response => response.json())

                .then(data => {

                    const tabela = document.getElementById("tabelaFamilia");

                    tabela.innerHTML = "";

                    if (data.length === 0) {

                        tabela.innerHTML = `
<tr>
<td colspan="7">Nenhum resultado encontrado</td>
</tr>
`;

                        return;
                    }

                    data.forEach(show => {

                        tabela.innerHTML += `
<tr>
<td>${show.cpf}</td>
<td>${show.integrante}</td>
<td>${show.telefone}</td>
<td>${show.bemcadastrado}</td>
<td>${show.documento}</td>

<td>

<button class="btn btn-danger btn-sm"
onclick="editar(${show.id})">
Editar
</button>

<button class="btn btn-danger btn-sm"
onclick="deletar(${show.id})">
Excluir
</button>
</td>

</tr>
`;

                    });

                });

        }

        </script>

</body>

</html>
