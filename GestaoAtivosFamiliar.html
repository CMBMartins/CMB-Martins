<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Gestão de Ativos Familiar</title>

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">

    <style>
        body {
            background-color: #f6f6f6;
            font-family: Arial;
        }

        .topo {
            background: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 24px;
        }

        .container {
            max-width: 900px;
        }

        h1 {
            margin-top: 20px;
        }

        form label {
            margin-top: 10px;
        }

        button {
            margin: 5px;
        }
    </style>

</head>

<body>

    <div class="topo">

        <img src="carlos1.gif" width="50">
        Gestão de Ativos Familiar
    </div>

    <a href="PaginaPessoal.html" class="btn btn-default">
        <span class="glyphicon glyphicon-home"></span> Página Principal
    </a>

    <div class="container">

        <div class="card">

            <div class="logo">
                <img src="Carlos.png" width="250">
            </div>

            <h2>Cadastrar ou Alterar Integrantes</h2>

            <form id="formIntegrantes">

                <label>CPF</label>
                <input type="text" id="codigo" class="form-control">

                <label>Integrante</label>
                <input type="text" id="integrante" class="form-control">

                <label>Contato Telefônico</label>
                <input type="text" id="contato" class="form-control">

                <label>Bem Cadastrado</label>
                <input type="text" id="bem" class="form-control">

                <label>Documentos</label>
                <input type="text" id="documento" class="form-control">

                <br>

                <button type="button" class="btn btn-success">Cadastrar Integrante</button>

                <button type="button" class="btn btn-primary">Atualizar Dados</button>

                <button type="button" class="btn btn-danger">Excluir Dados</button>

                <button type="button" class="btn btn-info">Consultar Integrante</button>

                <button type="button" class="btn btn-warning">Consultar CPF</button>

                <button type="button" class="btn btn-default">Consultar Todos</button>

                <button type="reset" class="btn btn-default">Limpar Formulário</button>

            </form>

            <hr>

            <h3>Login do Sistema</h3>

            <form>

                <label>Usuário</label>
                <input type="text" class="form-control">

                <label>Senha</label>
                <input type="password" class="form-control">

                <br>

                <button class="btn btn-primary">Realizar Login</button>

            </form>

        </div>

</body>


</html>
